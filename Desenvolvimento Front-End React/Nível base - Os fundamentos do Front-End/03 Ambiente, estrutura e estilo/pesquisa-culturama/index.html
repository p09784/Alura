<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa Culturama</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Pesquisa Culturama</h1>
    </div>
  </header>

  <main>
    <section>
      <div class="container">
        <h2>Pesquisa Online</h2>
        <p>Esta página servirá como base para o formulário de pesquisa. Preencha os dados abaixo e envie sua opinião.</p>

        <form action="#" method="post" class="form-pesquisa">
          <fieldset>
            <legend>Formulário de Pesquisa</legend>

            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" required placeholder="Seu nome">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="seu@exemplo.com">

            <label for="idade">Idade</label>
            <input type="number" id="idade" name="idade" min="0" max="120" placeholder="Ex: 30">

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" placeholder="Cidade / Estado">

            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}"
              placeholder="(00) 00000-0000"
              title="Digite no formato (00) 00000-0000"
            >

            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" name="nascimento">

            <label for="foto">Foto (opcional)</label>
            <input type="file" id="foto" name="foto" accept="image/*">

            <fieldset>
              <legend>Gênero</legend>
              <label>
                <input type="radio" name="genero" value="feminino" required>
                Feminino
              </label>
              <label>
                <input type="radio" name="genero" value="masculino">
                Masculino
              </label>
              <label>
                <input type="radio" name="genero" value="nao-binario">
                Não binário
              </label>
              <label>
                <input type="radio" name="genero" value="prefiro-nao-dizer">
                Prefiro não dizer
              </label>
            </fieldset>

            <label for="estadoCivil">Estado civil</label>
            <select id="estadoCivil" name="estadoCivil" required>
              <option value="">-- selecione --</option>
              <option value="solteiro">Solteiro(a)</option>
              <option value="casado">Casado(a)</option>
              <option value="uniao">União Estável</option>
              <option value="divorciado">Divorciado(a)</option>
              <option value="viuvo">Viúvo(a)</option>
            </select>

            <label for="estado">Estado (UF)</label>
            <select id="estado" name="estado">
              <option value="">-- selecione estado --</option>
              <option value="AC">Acre (AC)</option>
              <option value="AL">Alagoas (AL)</option>
              <option value="AP">Amapá (AP)</option>
              <option value="AM">Amazonas (AM)</option>
              <option value="BA">Bahia (BA)</option>
              <option value="CE">Ceará (CE)</option>
              <option value="DF">Distrito Federal (DF)</option>
              <option value="ES">Espírito Santo (ES)</option>
              <option value="GO">Goiás (GO)</option>
              <option value="MA">Maranhão (MA)</option>
              <option value="MG">Minas Gerais (MG)</option>
              <option value="MS">Mato Grosso do Sul (MS)</option>
              <option value="MT">Mato Grosso (MT)</option>
              <option value="PA">Pará (PA)</option>
              <option value="PB">Paraíba (PB)</option>
              <option value="PE">Pernambuco (PE)</option>
              <option value="PI">Piauí (PI)</option>
              <option value="PR">Paraná (PR)</option>
              <option value="RJ">Rio de Janeiro (RJ)</option>
              <option value="RN">Rio Grande do Norte (RN)</option>
              <option value="RO">Rondônia (RO)</option>
              <option value="RR">Roraima (RR)</option>
              <option value="RS">Rio Grande do Sul (RS)</option>
              <option value="SC">Santa Catarina (SC)</option>
              <option value="SE">Sergipe (SE)</option>
              <option value="SP">São Paulo (SP)</option>
              <option value="TO">Tocantins (TO)</option>
            </select>

            <label for="opiniao">Sua opinião</label>
            <textarea id="opiniao" name="opiniao" rows="5" placeholder="Conte o que achou..."></textarea>

            <button type="submit">Enviar pesquisa</button>
          </fieldset>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 — Pesquisa Culturama</p>
    </div>
  </footer>
</body>
</html>
